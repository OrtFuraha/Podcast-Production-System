<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div style="max-width:1200px;margin:0 auto;padding:20px;">
    <h1><i class="fas fa-user-shield" style="color:var(--primary);"></i> Admin Panel</h1>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px;">
      <div class="stat-card"><div class="stat-number">5,820</div><div class="stat-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-number">1,284</div><div class="stat-label">Total Podcasts</div></div>
      <div class="stat-card"><div class="stat-number">3,756</div><div class="stat-label">Episodes</div></div>
      <div class="stat-card"><div class="stat-number">$28.4K</div><div class="stat-label">Revenue</div></div>
    </div>
  </div>
</body>
</html>
